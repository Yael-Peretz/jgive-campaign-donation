    <rect x="480" y="230" width="240" height="180" />
    <rect x="520" y="270" width="40" height="40" fill="#1e3a8a" />
    <rect x="580" y="270" width="40" height="40" fill="#1e3a8a" />
    <rect x="640" y="270" width="40" height="40" fill="#1e3a8a" />
    <rect x="580" y="330" width="40" height="80" fill="#1e3a8a" />
  </g>

  <text x="60" y="440" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#ffffff">
    Help Build a New Community Center
  </text>
</svg>
