<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b45309" />
      <stop offset="100%" stop-color="#7c2d12" />
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)" />

  <!-- simple snowflake -->
  <g stroke="#ffffff" stroke-opacity="0.95" stroke-width="10" stroke-linecap="round">
    <line x1="600" y1="160" x2="600" y2="340" />
    <line x1="510" y1="200" x2="690" y2="300" />
    <line x1="690" y1="200" x2="510" y2="300" />
    <line x1="600" y1="160" x2="570" y2="190" />
    <line x1="600" y1="160" x2="630" y2="190" />
    <line x1="600" y1="340" x2="570" y2="310" />
    <line x1="600" y1="340" x2="630" y2="310" />
  </g>

  <text x="60" y="440" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#ffffff">
    Winter Relief Fund for Families in Need
  </text>
</svg>
